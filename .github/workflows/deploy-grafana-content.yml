name: Deploy Grafana Dashboards and Alerts

on:
  push:
    branches: [main]
    paths:
      - 'grafana/dashboards/**'
      - 'grafana/alerts/**'
      - 'grafana/notification-templates/**'
      - '.github/workflows/deploy-grafana-content.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy Grafana Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/production-GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Grafana workspace
        run: |
          WORKSPACE_ID=$(aws ssm get-parameter \
            --name "/observability/production/grafana-workspace-id" \
            --region ${{ env.AWS_REGION }} \
            --query "Parameter.Value" --output text)
          echo "WORKSPACE_ID=$WORKSPACE_ID" >> $GITHUB_ENV
          echo "GRAFANA_URL=https://${WORKSPACE_ID}.grafana-workspace.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_ENV
          echo "Workspace: $WORKSPACE_ID"

      - name: Create Grafana API key
        run: |
          API_KEY=$(aws grafana create-workspace-api-key \
            --workspace-id ${{ env.WORKSPACE_ID }} \
            --key-name "deploy-${{ github.run_id }}" \
            --key-role ADMIN \
            --seconds-to-live 300 \
            --region ${{ env.AWS_REGION }} \
            --query "key" --output text)
          echo "GRAFANA_API_KEY=$API_KEY" >> $GITHUB_ENV
          echo "API key created"

      - name: Deploy all dashboards
        run: |
          for file in grafana/dashboards/*.json; do
            echo "Deploying dashboard: $file"
            curl -sf -X POST \
              -H "Authorization: Bearer ${{ env.GRAFANA_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"dashboard\": $(cat $file), \"overwrite\": true, \"folderId\": 0}" \
              "${{ env.GRAFANA_URL }}/api/dashboards/import" && \
            echo "Deployed: $file" || echo "Failed: $file"
          done

      - name: Create alert folder
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ env.GRAFANA_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"title": "Platform Alerts", "uid": "platform-alerts"}' \
            "${{ env.GRAFANA_URL }}/api/folders" || true
          echo "Alert folder ready"

      - name: Deploy alert rules
        run: |
          for file in grafana/alerts/*.json; do
            echo "Deploying alert: $file"
            curl -sf -X POST \
              -H "Authorization: Bearer ${{ env.GRAFANA_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d @$file \
              "${{ env.GRAFANA_URL }}/api/v1/provisioning/alert-rules" && \
            echo "Deployed: $file" || echo "Warning - alert may already exist: $file"
          done

      - name: Delete Grafana API key
        if: always()
        run: |
          aws grafana delete-workspace-api-key \
            --workspace-id ${{ env.WORKSPACE_ID }} \
            --key-name "deploy-${{ github.run_id }}" \
            --region ${{ env.AWS_REGION }} || true

      - name: Print dashboard URL
        run: |
          echo "Dashboard: ${{ env.GRAFANA_URL }}/d/aws-infra-v1"

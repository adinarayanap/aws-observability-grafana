name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'cloudformation/**'
      - 'lambda/**'
      - '.github/workflows/deploy-infrastructure.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: production
  SSO_ORG_ID: d-9f675059e1
  NOTIFICATION_EMAIL: adiawss@outlook.com

jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/production-GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Get S3 bucket
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name production-github-oidc-role \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ArtifactsBucketName'].OutputValue" \
            --output text)
          echo "ARTIFACTS_BUCKET=$BUCKET" >> $GITHUB_ENV

      - name: Package and upload Lambda functions
        run: |
          for dir in sso_user_assigner grafana_datasource grafana_dashboard grafana_alert; do
            cd lambda/$dir
            zip -r /tmp/${dir}.zip index.py
            aws s3 cp /tmp/${dir}.zip s3://${{ env.ARTIFACTS_BUCKET }}/lambda/${dir}.zip
            cd ../..
          done

      - name: Deploy Grafana stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name production-grafana-v2 \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          PARAMS="ParameterKey=EnvironmentName,ParameterValue=${{ env.ENVIRONMENT }} ParameterKey=SSOOrganizationId,ParameterValue=${{ env.SSO_ORG_ID }} ParameterKey=NotificationEmail,ParameterValue=${{ env.NOTIFICATION_EMAIL }} ParameterKey=ArtifactsBucket,ParameterValue=${{ env.ARTIFACTS_BUCKET }} ParameterKey=GrafanaUser1Id,ParameterValue=b1738dea-8051-707d-472d-cf6e504f2627 ParameterKey=GrafanaUser2Id,ParameterValue=71239d8a-b011-707c-a5a0-d56fc0d04462"

          if [ "$STATUS" = "DOES_NOT_EXIST" ] || [ "$STATUS" = "DELETE_COMPLETE" ]; then
            aws cloudformation create-stack \
              --stack-name production-grafana-v2 \
              --template-body file://cloudformation/grafana/grafana-workspace.yaml \
              --region ${{ env.AWS_REGION }} \
              --parameters $PARAMS \
              --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
              --disable-rollback
            aws cloudformation wait stack-create-complete \
              --stack-name production-grafana-v2 \
              --region ${{ env.AWS_REGION }}
            echo "Grafana stack created"
          elif [ "$STATUS" = "CREATE_COMPLETE" ] || [ "$STATUS" = "UPDATE_COMPLETE" ]; then
            echo "Grafana stack already exists and is healthy - skipping"
          else
            echo "Grafana stack in state: $STATUS - skipping update"
          fi

      - name: Assign SSO users
        run: |
          WORKSPACE_ID=$(aws ssm get-parameter \
            --name "/observability/production/grafana-workspace-id" \
            --region ${{ env.AWS_REGION }} \
            --query "Parameter.Value" --output text)
          aws grafana update-permissions \
            --workspace-id $WORKSPACE_ID \
            --update-instruction-batch \
              "action=ADD,role=ADMIN,users=[{id=b1738dea-8051-707d-472d-cf6e504f2627,type=SSO_USER},{id=71239d8a-b011-707c-a5a0-d56fc0d04462,type=SSO_USER}]" \
            --region ${{ env.AWS_REGION }} || true
          echo "SSO users assigned"

      - name: Deploy CloudWatch stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name production-cloudwatch-observability \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          SNS_ARN=$(aws ssm get-parameter \
            --name "/observability/production/sns-topic-arn" \
            --region ${{ env.AWS_REGION }} \
            --query "Parameter.Value" --output text)

          if [ "$STATUS" = "DOES_NOT_EXIST" ] || [ "$STATUS" = "DELETE_COMPLETE" ]; then
            aws cloudformation create-stack \
              --stack-name production-cloudwatch-observability \
              --template-body file://cloudformation/cloudwatch/cloudwatch-observability.yaml \
              --region ${{ env.AWS_REGION }} \
              --parameters \
                ParameterKey=EnvironmentName,ParameterValue=${{ env.ENVIRONMENT }} \
                ParameterKey=ApplicationName,ParameterValue=myapp \
                ParameterKey=AlertSNSTopicArn,ParameterValue=$SNS_ARN \
              --capabilities CAPABILITY_IAM
            aws cloudformation wait stack-create-complete \
              --stack-name production-cloudwatch-observability \
              --region ${{ env.AWS_REGION }}
            echo "CloudWatch stack created"
          elif [ "$STATUS" = "CREATE_COMPLETE" ] || [ "$STATUS" = "UPDATE_COMPLETE" ]; then
            echo "CloudWatch stack already healthy - checking for updates"
            aws cloudformation update-stack \
              --stack-name production-cloudwatch-observability \
              --template-body file://cloudformation/cloudwatch/cloudwatch-observability.yaml \
              --region ${{ env.AWS_REGION }} \
              --parameters \
                ParameterKey=EnvironmentName,ParameterValue=${{ env.ENVIRONMENT }} \
                ParameterKey=ApplicationName,ParameterValue=myapp \
                ParameterKey=AlertSNSTopicArn,ParameterValue=$SNS_ARN \
              --capabilities CAPABILITY_IAM 2>&1 | \
              grep -v "No updates are to be performed" || true
          fi

      - name: Deploy monitoring infrastructure (EC2, ALB, RDS)
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name production-monitoring-infra \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          if [ "$STATUS" = "DOES_NOT_EXIST" ] || [ "$STATUS" = "DELETE_COMPLETE" ]; then
            aws cloudformation create-stack \
              --stack-name production-monitoring-infra \
              --template-body file://cloudformation/ec2/monitoring-infrastructure.yaml \
              --region ${{ env.AWS_REGION }} \
              --parameters \
                ParameterKey=EnvironmentName,ParameterValue=${{ env.ENVIRONMENT }} \
              --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM
            echo "Monitoring infra creating - EC2, ALB, RDS..."
            aws cloudformation wait stack-create-complete \
              --stack-name production-monitoring-infra \
              --region ${{ env.AWS_REGION }}
            echo "Monitoring infra created"
          elif [ "$STATUS" = "CREATE_COMPLETE" ] || [ "$STATUS" = "UPDATE_COMPLETE" ]; then
            echo "Monitoring infra healthy - checking for updates"
            aws cloudformation update-stack \
              --stack-name production-monitoring-infra \
              --template-body file://cloudformation/ec2/monitoring-infrastructure.yaml \
              --region ${{ env.AWS_REGION }} \
              --parameters \
                ParameterKey=EnvironmentName,ParameterValue=${{ env.ENVIRONMENT }} \
              --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM 2>&1 | \
              grep -v "No updates are to be performed" || true
          fi

      - name: Print all URLs
        run: |
          WORKSPACE_ID=$(aws ssm get-parameter \
            --name "/observability/production/grafana-workspace-id" \
            --region ${{ env.AWS_REGION }} \
            --query "Parameter.Value" --output text)

          ALB=$(aws cloudformation describe-stacks \
            --stack-name production-monitoring-infra \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ALBDNSName'].OutputValue" \
            --output text 2>/dev/null || echo "not deployed yet")

          echo "============================================"
          echo "Grafana: https://${WORKSPACE_ID}.grafana-workspace.${{ env.AWS_REGION }}.amazonaws.com"
          echo "Dashboard: https://${WORKSPACE_ID}.grafana-workspace.${{ env.AWS_REGION }}.amazonaws.com/d/aws-infra-v1"
          echo "ALB: http://${ALB}"
          echo "============================================"

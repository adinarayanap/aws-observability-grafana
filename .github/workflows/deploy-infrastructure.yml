name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'cloudformation/**'
      - 'lambda/**'
      - '.github/workflows/deploy-infrastructure.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: production
  SSO_ORG_ID: d-9f675059e1
  NOTIFICATION_EMAIL: adiawss@outlook.com

jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/production-GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Get S3 bucket
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name production-github-oidc-role \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ArtifactsBucketName'].OutputValue" \
            --output text)
          echo "ARTIFACTS_BUCKET=$BUCKET" >> $GITHUB_ENV

      - name: Package and upload Lambda functions
        run: |
          for dir in sso_user_assigner grafana_datasource grafana_dashboard grafana_alert; do
            cd lambda/$dir
            zip -r /tmp/${dir}.zip index.py
            aws s3 cp /tmp/${dir}.zip s3://${{ env.ARTIFACTS_BUCKET }}/lambda/${dir}.zip
            cd ../..
          done

      - name: Upload dashboards to S3
        run: |
          aws s3 sync grafana/dashboards/ \
            s3://${{ env.ARTIFACTS_BUCKET }}/grafana/dashboards/ --delete

      - name: Deploy Grafana stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name production-grafana-v2 \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Grafana stack status: $STATUS"
          PARAMS="ParameterKey=EnvironmentName,ParameterValue=${{ env.ENVIRONMENT }} ParameterKey=SSOOrganizationId,ParameterValue=${{ env.SSO_ORG_ID }} ParameterKey=NotificationEmail,ParameterValue=${{ env.NOTIFICATION_EMAIL }} ParameterKey=ArtifactsBucket,ParameterValue=${{ env.ARTIFACTS_BUCKET }} ParameterKey=GrafanaUser1Id,ParameterValue=b1738dea-8051-707d-472d-cf6e504f2627 ParameterKey=GrafanaUser2Id,ParameterValue=71239d8a-b011-707c-a5a0-d56fc0d04462"
          if [ "$STATUS" = "DOES_NOT_EXIST" ] || [ "$STATUS" = "DELETE_COMPLETE" ]; then
            aws cloudformation create-stack \
              --stack-name production-grafana-v2 \
              --template-body file://cloudformation/grafana/grafana-workspace.yaml \
              --region ${{ env.AWS_REGION }} \
              --parameters $PARAMS \
              --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
              --disable-rollback
            aws cloudformation wait stack-create-complete \
              --stack-name production-grafana-v2 \
              --region ${{ env.AWS_REGION }}
          elif [ "$STATUS" = "CREATE_COMPLETE" ] || [ "$STATUS" = "UPDATE_COMPLETE" ]; then
            echo "Grafana stack healthy - skipping"
          fi

      - name: Assign SSO users
        run: |
          WORKSPACE_ID=$(aws ssm get-parameter \
            --name "/observability/production/grafana-workspace-id" \
            --region ${{ env.AWS_REGION }} \
            --query "Parameter.Value" --output text)
          aws grafana update-permissions \
            --workspace-id $WORKSPACE_ID \
            --update-instruction-batch \
              "action=ADD,role=ADMIN,users=[{id=b1738dea-8051-707d-472d-cf6e504f2627,type=SSO_USER},{id=71239d8a-b011-707c-a5a0-d56fc0d04462,type=SSO_USER}]" \
            --region ${{ env.AWS_REGION }} || true

      - name: Deploy CloudWatch stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name production-cloudwatch-observability \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          SNS_ARN=$(aws ssm get-parameter \
            --name "/observability/production/sns-topic-arn" \
            --region ${{ env.AWS_REGION }} \
            --query "Parameter.Value" --output text)
          if [ "$STATUS" = "DOES_NOT_EXIST" ] || [ "$STATUS" = "DELETE_COMPLETE" ]; then
            aws cloudformation create-stack \
              --stack-name production-cloudwatch-observability \
              --template-body file://cloudformation/cloudwatch/cloudwatch-observability.yaml \
              --region ${{ env.AWS_REGION }} \
              --parameters \
                ParameterKey=EnvironmentName,ParameterValue=${{ env.ENVIRONMENT }} \
                ParameterKey=ApplicationName,ParameterValue=myapp \
                ParameterKey=AlertSNSTopicArn,ParameterValue=$SNS_ARN \
              --capabilities CAPABILITY_IAM
            aws cloudformation wait stack-create-complete \
              --stack-name production-cloudwatch-observability \
              --region ${{ env.AWS_REGION }}
          elif [ "$STATUS" = "CREATE_COMPLETE" ] || [ "$STATUS" = "UPDATE_COMPLETE" ]; then
            aws cloudformation update-stack \
              --stack-name production-cloudwatch-observability \
              --template-body file://cloudformation/cloudwatch/cloudwatch-observability.yaml \
              --region ${{ env.AWS_REGION }} \
              --parameters \
                ParameterKey=EnvironmentName,ParameterValue=${{ env.ENVIRONMENT }} \
                ParameterKey=ApplicationName,ParameterValue=myapp \
                ParameterKey=AlertSNSTopicArn,ParameterValue=$SNS_ARN \
              --capabilities CAPABILITY_IAM 2>&1 | grep -v "No updates" || true
          fi

      - name: Deploy monitoring infrastructure (EC2, ALB, RDS)
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name production-monitoring-infra \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Monitoring infra status: $STATUS"
          if [ "$STATUS" = "DOES_NOT_EXIST" ] || [ "$STATUS" = "DELETE_COMPLETE" ]; then
            aws cloudformation create-stack \
              --stack-name production-monitoring-infra \
              --template-body file://cloudformation/ec2/monitoring-infrastructure.yaml \
              --region ${{ env.AWS_REGION }} \
              --parameters \
                ParameterKey=EnvironmentName,ParameterValue=${{ env.ENVIRONMENT }} \
              --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM
            aws cloudformation wait stack-create-complete \
              --stack-name production-monitoring-infra \
              --region ${{ env.AWS_REGION }}
          elif [ "$STATUS" = "CREATE_COMPLETE" ] || [ "$STATUS" = "UPDATE_COMPLETE" ]; then
            aws cloudformation update-stack \
              --stack-name production-monitoring-infra \
              --template-body file://cloudformation/ec2/monitoring-infrastructure.yaml \
              --region ${{ env.AWS_REGION }} \
              --parameters \
                ParameterKey=EnvironmentName,ParameterValue=${{ env.ENVIRONMENT }} \
              --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM 2>&1 | grep -v "No updates" || true
          fi

      - name: Auto-update Grafana dashboard with new instance IDs
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Name,Values=production-monitoring-ec2" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          ALB_DIM=$(aws elbv2 describe-load-balancers \
            --region ${{ env.AWS_REGION }} \
            --query "LoadBalancers[?LoadBalancerName=='production-monitoring-alb'].LoadBalancerArn" \
            --output text | sed 's|arn:aws:elasticloadbalancing:[^:]*:[^:]*:||')
          WORKSPACE_ID=$(aws ssm get-parameter \
            --name "/observability/production/grafana-workspace-id" \
            --region ${{ env.AWS_REGION }} \
            --query "Parameter.Value" --output text)
          GRAFANA_URL="https://${WORKSPACE_ID}.grafana-workspace.${{ env.AWS_REGION }}.amazonaws.com"
          API_KEY=$(aws grafana create-workspace-api-key \
            --workspace-id $WORKSPACE_ID \
            --key-name "auto-${{ github.run_id }}" \
            --key-role ADMIN \
            --seconds-to-live 300 \
            --region ${{ env.AWS_REGION }} \
            --query "key" --output text)
          echo "Instance: $INSTANCE_ID | ALB: $ALB_DIM"
          cat > /tmp/dashboard.json << DASHEOF
          {
            "title": "AWS Infrastructure Observability",
            "uid": "aws-infra-v1",
            "schemaVersion": 38,
            "refresh": "1m",
            "tags": ["aws","observability","cloudwatch"],
            "time": {"from": "now-1h", "to": "now"},
            "panels": [
              {"id":1,"type":"gauge","title":"CPU Utilization","gridPos":{"h":6,"w":6,"x":0,"y":0},
               "datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},
               "targets":[{"refId":"A","datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},"queryMode":"Metrics","namespace":"AWS/EC2","metricName":"CPUUtilization","statistic":"Average","period":"60","region":"us-east-1","dimensions":{"InstanceId":"$INSTANCE_ID"},"matchExact":true,"metricQueryType":0,"metricEditorMode":0}],
               "fieldConfig":{"defaults":{"min":0,"max":100,"unit":"percent","thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":60},{"color":"red","value":80}]}}}},
              {"id":2,"type":"gauge","title":"Memory Utilization","gridPos":{"h":6,"w":6,"x":6,"y":0},
               "datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},
               "targets":[{"refId":"A","datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},"queryMode":"Metrics","namespace":"CWAgent","metricName":"mem_used_percent","statistic":"Average","period":"60","region":"us-east-1","dimensions":{"InstanceId":"$INSTANCE_ID"},"matchExact":true,"metricQueryType":0,"metricEditorMode":0}],
               "fieldConfig":{"defaults":{"min":0,"max":100,"unit":"percent","thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":70},{"color":"red","value":85}]}}}},
              {"id":3,"type":"timeseries","title":"CPU Trend","gridPos":{"h":6,"w":12,"x":12,"y":0},
               "datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},
               "targets":[{"refId":"A","datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},"queryMode":"Metrics","namespace":"AWS/EC2","metricName":"CPUUtilization","statistic":"Average","period":"60","region":"us-east-1","dimensions":{"InstanceId":"$INSTANCE_ID"},"matchExact":true,"alias":"Avg CPU","metricQueryType":0,"metricEditorMode":0},
                           {"refId":"B","datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},"queryMode":"Metrics","namespace":"AWS/EC2","metricName":"CPUUtilization","statistic":"Maximum","period":"60","region":"us-east-1","dimensions":{"InstanceId":"$INSTANCE_ID"},"matchExact":true,"alias":"Max CPU","metricQueryType":0,"metricEditorMode":0}]},
              {"id":4,"type":"timeseries","title":"ALB Request Count","gridPos":{"h":7,"w":12,"x":0,"y":6},
               "datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},
               "targets":[{"refId":"A","datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},"queryMode":"Metrics","namespace":"AWS/ApplicationELB","metricName":"RequestCount","statistic":"Sum","period":"60","region":"us-east-1","dimensions":{"LoadBalancer":"$ALB_DIM"},"matchExact":true,"alias":"Requests","metricQueryType":0,"metricEditorMode":0},
                           {"refId":"B","datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},"queryMode":"Metrics","namespace":"AWS/ApplicationELB","metricName":"HTTPCode_Target_5XX_Count","statistic":"Sum","period":"60","region":"us-east-1","dimensions":{"LoadBalancer":"$ALB_DIM"},"matchExact":true,"alias":"5xx","metricQueryType":0,"metricEditorMode":0}]},
              {"id":5,"type":"timeseries","title":"RDS Connections","gridPos":{"h":7,"w":12,"x":12,"y":6},
               "datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},
               "targets":[{"refId":"A","datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},"queryMode":"Metrics","namespace":"AWS/RDS","metricName":"DatabaseConnections","statistic":"Average","period":"60","region":"us-east-1","dimensions":{"DBInstanceIdentifier":"production-monitoring-db"},"matchExact":true,"alias":"Connections","metricQueryType":0,"metricEditorMode":0}]},
              {"id":6,"type":"stat","title":"Server Down Status","gridPos":{"h":5,"w":6,"x":0,"y":13},
               "datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},
               "targets":[{"refId":"A","datasource":{"type":"cloudwatch","uid":"efjjqjppp5gjkb"},"queryMode":"Metrics","namespace":"AWS/EC2","metricName":"StatusCheckFailed","statistic":"Maximum","period":"60","region":"us-east-1","dimensions":{"InstanceId":"$INSTANCE_ID"},"matchExact":true,"metricQueryType":0,"metricEditorMode":0}],
               "options":{"reduceOptions":{"calcs":["lastNotNull"]},"colorMode":"background","graphMode":"none"},
               "fieldConfig":{"defaults":{"mappings":[{"type":"value","options":{"0":{"text":"UP","color":"green","index":0},"1":{"text":"DOWN","color":"red","index":1}}}],"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"red","value":1}]}}}}
            ]
          }
          DASHEOF
          curl -sf -X POST \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"dashboard\": $(cat /tmp/dashboard.json), \"overwrite\": true, \"folderId\": 0}" \
            "${GRAFANA_URL}/api/dashboards/import" && \
          echo "Dashboard auto-updated with instance: $INSTANCE_ID"
          aws grafana delete-workspace-api-key \
            --workspace-id $WORKSPACE_ID \
            --key-name "auto-${{ github.run_id }}" \
            --region ${{ env.AWS_REGION }} || true

      - name: Print all URLs
        run: |
          WORKSPACE_ID=$(aws ssm get-parameter \
            --name "/observability/production/grafana-workspace-id" \
            --region ${{ env.AWS_REGION }} \
            --query "Parameter.Value" --output text)
          echo "============================================"
          echo "Grafana: https://${WORKSPACE_ID}.grafana-workspace.${{ env.AWS_REGION }}.amazonaws.com"
          echo "Dashboard: https://${WORKSPACE_ID}.grafana-workspace.${{ env.AWS_REGION }}.amazonaws.com/d/aws-infra-v1"
          echo "============================================"
